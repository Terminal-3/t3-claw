# T3Claw Profile: local-sandbox
#
# Solo developer setup with Docker sandbox enabled for secure tool execution.
# Same as 'local' but tools run inside isolated containers.
#
# Prerequisites:
#   - Docker daemon running
#
# Usage: set T3CLAW_PROFILE=local-sandbox in your environment or .env file.

database_backend = "libsql"

[channels]
gateway_enabled = false
cli_mode = "tui"

[sandbox]
enabled = true
policy = "readonly"

[heartbeat]
enabled = false

[routines]
enabled = false

[hygiene]
enabled = false
