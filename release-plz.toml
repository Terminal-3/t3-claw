[workspace]
# GitHub Releases are created by cargo-dist (release.yml), not release-plz.
# release-plz only creates git tags and publishes to crates.io.
git_release_enable = false

# ── Main binary ─────────────────────────────────────────────
# Cannot publish to crates.io because bastionclaw_engine depends on `monty`
# (git-only, not on crates.io). Still create git tags so cargo-dist builds
# binaries and creates GitHub Releases.
[[package]]
name = "bastionclaw"
publish = false

# ── Internal crates (not useful standalone) ─────────────────
[[package]]
name = "bastionclaw_engine"
publish = false
release = false

[[package]]
name = "bastionclaw_tui"
publish = false
release = false

[[package]]
name = "bastionclaw_gateway"
publish = false
release = false
